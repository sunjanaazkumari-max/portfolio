<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Task Manager</title>

  <style>
    body {
      background: linear-gradient(to right, #eef2f3, #dfe9f3);
    }

    h2 {
      margin-top: 30px;
    }

    .container {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      max-width: 500px;
      margin: auto;
    }

    .completed {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .list-group-item:hover {
      background-color: #f1f3f5;
      cursor: pointer;
      transition: 0.2s;
    }

    #taskCounter {
      font-weight: 500;
      margin-bottom: 10px;
    }

    #taskInput:focus {
      box-shadow: none;
      border-color: #198754;
    }

    .btn-success:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <h2 class="text-center mb-4">Sanjana's Task Manager</h2>

  <div class="container mt-5">
    <input id="taskInput" class="form-control mb-3" placeholder="Enter your task">

    <div class="d-flex gap-2 mb-3">
      <button id="addBtn" class="btn btn-success flex-grow-1">Add Task</button>
      <button id="clearBtn" class="btn btn-outline-danger btn-sm">Clear</button>
    </div>

    <p id="taskCounter" class="text-center mt-2"></p>

    <ul id="taskList" class="list-group"></ul>
  </div>

  <script>
    let tasks = [];

    const taskInput = document.querySelector("#taskInput");
    const addBtn = document.querySelector("#addBtn");
    const taskList = document.querySelector("#taskList");
    const clearBtn = document.querySelector("#clearBtn");
    const taskCounter = document.querySelector("#taskCounter");

    // Enter key support
    taskInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        addTask();
      }
    });

    // Load from localStorage
    const savedTasks = localStorage.getItem("tasks");
    if (savedTasks) {
      tasks = JSON.parse(savedTasks);
    }

    function renderTasks() {
      taskList.innerHTML = "";

      // Empty state
      if (tasks.length === 0) {
        taskList.innerHTML = `
          <p class='text-center text-muted'>
            No tasks yet 🚀<br>
            <small>Add your first task above</small>
          </p>
        `;
        taskCounter.textContent = "";
        return;
      }

      tasks.forEach(function (task, index) {
        const li = document.createElement("li");
        li.textContent = task.text;
        li.className = "list-group-item d-flex justify-content-between align-items-center";

        // Show completed
        if (task.completed) {
          li.classList.add("completed");
        }

        // Toggle complete
        li.addEventListener("click", function () {
          task.completed = !task.completed;
          localStorage.setItem("tasks", JSON.stringify(tasks));
          renderTasks();
        });

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "✕";
        deleteBtn.className = "btn btn-danger btn-sm";

        deleteBtn.addEventListener("click", function (e) {
          e.stopPropagation();

          if (confirm("Delete this task?")) {
            tasks.splice(index, 1);
            localStorage.setItem("tasks", JSON.stringify(tasks));
            renderTasks();
          }
        });

        li.appendChild(deleteBtn);
        taskList.appendChild(li);
      });

      // Counter
      const remainingTasks = tasks.filter(function (task) {
        return task.completed === false;
      });

      if (remainingTasks.length === 0) {
        taskCounter.textContent = "All done! 🎉";
      } else {
        taskCounter.textContent = remainingTasks.length + " tasks remaining";
      }
    }

    renderTasks();

    function addTask() {
      const task = taskInput.value.trim();

      if (task === "") return;

      tasks.push({
        text: task,
        completed: false
      });

      localStorage.setItem("tasks", JSON.stringify(tasks));
      renderTasks();

      taskInput.value = "";
      taskInput.focus();
    }

    addBtn.addEventListener("click", addTask);

    clearBtn.addEventListener("click", function () {
      tasks = [];
      localStorage.setItem("tasks", JSON.stringify(tasks));
      renderTasks();
    });
  </script>

</body>

</html>
